name: Semgrep SAST Scan
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  semgrep:
    name: semgrep/sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan --config=auto --error
